target_repo:
  full_name: ""
  default_branch: "main"

llm:
  provider: "anthropic"
  anthropic_model: "claude-opus-4-6"
  openai_model: "gpt-4.1"
  max_tokens: 4096
  temperature: 0.2

planning:
  roadmap_path: "ROADMAP.md"
  memory_path: ".agent/memory.json"
  scan_todo_comments: true
  todo_file_globs:
    - "pc_agent.py"
    - "App.js"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.py"
  consider_open_issues: true
  max_candidate_tasks: 8

limits:
  max_files_per_run: 4
  max_lines_changed_per_run: 250
  max_reviewer_retries: 2
  max_debugger_retries: 3
  max_planner_retries: 1

testing:
  test_command: "python -m py_compile pc_agent.py"
  test_timeout_seconds: 300
  build_command: ""

protected_paths:
  - ".env"
  - ".env.*"
  - "secrets/**"
  - "**/*secret*"
  - "**/*credential*"
  - "**/*.pem"
  - "**/*.key"
  - ".github/workflows/**"
  - ".git/**"
  - "eas.json"
  - ".easignore"
  - "app.json"
  - "app.config.js"

schema_review:
  patterns:
    - "**/migrations/**"
    - "**/schema.sql"

git:
  branch_prefix: "agent/"
  commit_author_name: "Dream-Weaver AI Engineer"
  commit_author_email: "agent@steelinx.local"
  open_pr: true
  pr_label: "ai-generated"

reporting:
  discord_enabled: true
  email_enabled: false
  email_to: ""
  email_from: ""
  include_diff_in_report: false
